<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lullaby Codex</title>
  <meta name="description" content="A minimal binary terminal where Codex turns 0 and 1 into rest frequencies." />
  <link rel="stylesheet" href="style.css?v=e7c2d2d-terminal" />
</head>
<body>
  <canvas id="terminal" aria-hidden="true"></canvas>
  <main class="shell" aria-live="polite">
    <section class="terminal-window" aria-label="Lullaby Codex terminal">
      <header class="terminal-bar">
        <div class="lights" aria-hidden="true"><i></i><i></i><i></i></div>
        <span>lullaby.codex</span>
        <code>0:261.63Hz · 1:392.00Hz</code>
      </header>
      <div class="screen" id="screen">
        <p class="prompt">codex@rest:~$ boot_lullaby</p>
        <h1>Lullaby Codex</h1>
        <p class="signal-line">0 / 1 → frequency → rest</p>
        <button class="primary" id="enterBtn">BOOT</button>
      </div>
    </section>
  </main>
  <script src="app.js?v=e7c2d2d-terminal"></script>
</body>
</html>
